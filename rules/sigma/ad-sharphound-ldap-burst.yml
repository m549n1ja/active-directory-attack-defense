title: SharpHound LDAP Enumeration Burst
id: b1c2d3e4-0004-4f6a-9b8c-000000000004
status: experimental
description: >
  Detects the high-volume LDAP enumeration pattern generated by SharpHound
  during BloodHound reconnaissance. SharpHound queries AD objects at a volume
  and rate abnormal for standard user behavior, targeting users, groups,
  computers, GPOs, ACLs, and trust objects in a compressed timeframe.
  Apply as a threshold rule in SIEM — 100+ Event 4662 events from the same
  source user within 10 minutes is the recommended threshold.
references:
  - https://attack.mitre.org/techniques/T1087/002/
  - https://bloodhound.specterops.io/
author: John Medina
date: 2026/05/08
tags:
  - attack.discovery
  - attack.t1087.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4662
    OperationType: 'Object Access'
    ObjectType: '%{19195a5b-6da0-11d0-afd3-00c04fd930c9}'
  filter_machine_accounts:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_machine_accounts
  # Recommended SIEM threshold:
  # 100 or more Event 4662 events by SubjectUserName within 10 minutes.
  # Apply this as a threshold rule in Kibana Security — standard Sigma does not
  # support aggregation-based conditions.
falsepositives:
  - Legitimate AD management or synchronization tools performing bulk queries
  - Domain controller replication (filtered by machine account exclusion)
  - Scheduled scripts that perform AD reporting or auditing
fields:
  - SubjectUserName
  - ObjectType
  - ObjectName
  - OperationType
level: high
