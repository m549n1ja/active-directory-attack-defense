title: Kerberoasting — RC4 Ticket Request
id: b1c2d3e4-0001-4f6a-9b8c-000000000001
status: experimental
description: >
  Detects Kerberos service ticket requests using RC4 encryption (etype 0x17),
  which is the primary indicator of Kerberoasting. Modern environments use AES.
  An RC4 TGS request targeting a user account SPN from a non-DC source is a
  strong signal of offline hash cracking preparation.
references:
  - https://attack.mitre.org/techniques/T1558/003/
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4769
author: John Medina
date: 2026/05/08
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    TicketEncryptionType: '0x17'
  filter_machine_accounts:
    ServiceName|endswith: '$'
  filter_krbtgt:
    ServiceName: 'krbtgt'
  condition: selection and not filter_machine_accounts and not filter_krbtgt
falsepositives:
  - Legacy applications that require RC4 Kerberos and have not been migrated to AES
  - Environments with mixed-mode encryption during AES migration
fields:
  - ServiceName
  - TicketEncryptionType
  - ClientAddress
  - SubjectUserName
level: high
